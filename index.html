<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1e3a8a">

  <title>Digital Synergy</title>

  <link rel="manifest" href="manifest.webmanifest">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Digital Synergy">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #0f172a;
      font-family: Arial, sans-serif;
    }

    #loadingScreen {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      color: #ffffff;
      text-align: center;
      background: linear-gradient(135deg, #1e3a8a, #2563eb);
      transition: opacity .25s ease, visibility .25s ease;
    }

    #loadingScreen.hide {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .logoBox {
      width: 76px;
      height: 76px;
      border-radius: 24px;
      display: grid;
      place-items: center;
      background: rgba(255, 255, 255, .16);
      font-weight: 900;
      letter-spacing: .08em;
      box-shadow: 0 18px 45px rgba(0, 0, 0, .24);
    }

    .appTitle {
      margin: 0;
      font-size: 18px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    .appSubTitle {
      margin: 0;
      font-size: 11px;
      font-weight: 700;
      opacity: .8;
      text-transform: uppercase;
      letter-spacing: .12em;
    }

    #appFrame {
      width: 100vw;
      height: 100dvh;
      display: block;
      border: 0;
      background: #f8fafc;
    }

    #offlineNotice {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: calc(12px + env(safe-area-inset-bottom));
      z-index: 20;
      display: none;
      padding: 12px 14px;
      border-radius: 16px;
      background: #991b1b;
      color: #ffffff;
      font-size: 12px;
      font-weight: 700;
      text-align: center;
      box-shadow: 0 16px 40px rgba(0, 0, 0, .25);
    }

    body.is-offline #offlineNotice {
      display: block;
    }
  </style>
</head>

<body>
  <div id="loadingScreen">
    <div class="logoBox">KPU</div>
    <p class="appTitle">Digital Synergy</p>
    <p class="appSubTitle">Memuat Aplikasi</p>
  </div>

  <!-- GANTI LINK DI BAWAH INI DENGAN LINK /exec APPS SCRIPT ANDA -->
  <iframe
    id="appFrame"
    title="Digital Synergy Apps Script"
    src="PASTE_LINK_EXEC_APPS_SCRIPT_DI_SINI"
    allow="clipboard-read; clipboard-write; fullscreen">
  </iframe>

  <div id="offlineNotice">
    Koneksi internet terputus. PWA terbuka, tetapi aplikasi Apps Script tetap membutuhkan internet.
  </div>

  <script>
    const loadingScreen = document.getElementById('loadingScreen');
    const appFrame = document.getElementById('appFrame');

    appFrame.addEventListener('load', () => {
      loadingScreen.classList.add('hide');
    });

    setTimeout(() => {
      loadingScreen.classList.add('hide');
    }, 6500);

    function updateOnlineStatus() {
      document.body.classList.toggle('is-offline', !navigator.onLine);
    }

    window.addEventListener('online', updateOnlineStatus);
    window.addEventListener('offline', updateOnlineStatus);
    updateOnlineStatus();

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js')
          .catch(error => console.log('Service Worker gagal:', error));
      });
    }
  </script>
</body>
</html>
